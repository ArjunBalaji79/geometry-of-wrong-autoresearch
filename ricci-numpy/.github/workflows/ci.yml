name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest (core + fast paths)
        run: pytest tests/ -v

      - name: Validate canonical graphs directly
        run: |
          python -m ricci_numpy.core
          python -m ricci_numpy._numba

  test-core-only:
    name: tests (numpy-only, no numba)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install core only (numpy)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run pytest (numba tests will be skipped)
        run: pytest tests/ -v
